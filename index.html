<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极简笔记</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <h1>极简笔记</h1>
        <p>快速录入 · 分类管理 · 全文搜索</p>
      </header>

      <section class="card">
        <div class="row">
          <input id="quickInput" type="text" placeholder="输入笔记内容，回车快速保存…" />
          <select id="categorySelect"></select>
          <button id="addBtn">保存</button>
        </div>
        <div class="row row-gap">
          <input id="newCategoryInput" type="text" placeholder="新增分类（例如：工作）" />
          <button id="addCategoryBtn" class="ghost">添加分类</button>
        </div>
      </section>

      <section class="row row-gap">
        <input id="searchInput" class="search" type="text" placeholder="搜索笔记或分类…" />
      </section>

      <section class="meta">
        <span id="countText">0 条笔记</span>
      </section>

      <section id="notesList" class="list"></section>
    </main>

    <template id="noteTpl">
      <article class="note">
        <div class="note-head">
          <span class="tag"></span>
          <button class="del">删除</button>
        </div>
        <p class="content"></p>
        <time class="time"></time>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
